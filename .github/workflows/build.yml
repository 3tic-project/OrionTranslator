# ─────────────────────────────────────────────────────────────
# OrionTranslator — CI/CD 构建工作流
# macOS Intel (x86_64) / ARM (arm64): .app → .dmg
# Windows x64: .exe + ner_model → .zip  &  .exe-only → .zip
# ─────────────────────────────────────────────────────────────
name: Build & Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  APP_NAME: OrionTranslator
  BINARY_NAME: alnitak
  NER_MODEL_REPO: 3tic/Orion-NER-110M-v1

jobs:
  # ════════════════════════════════════════════════════════════
  # macOS — 矩阵构建 (Intel x86_64 / Apple Silicon arm64)
  # ════════════════════════════════════════════════════════════
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel          # Intel runner
            rust_target: x86_64-apple-darwin
            suffix: macOS-x86_64
          - arch: arm64
            runner: macos-latest      # Apple Silicon runner (macos-14+)
            rust_target: aarch64-apple-darwin
            suffix: macOS-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust_target }}

      - name: Download NER model
        run: |
          mkdir -p alnilam/ner_model
          for f in model.safetensors config.json vocab.txt system.dic.zst; do
            echo "Downloading ${f}..."
            curl -fSL \
              "https://huggingface.co/${NER_MODEL_REPO}/resolve/main/${f}" \
              -o "alnilam/ner_model/${f}"
          done
          ls -lh alnilam/ner_model/

      - name: Build release binary
        run: cargo build --release -p alnitak --target ${{ matrix.rust_target }}

      - name: Package .app & .dmg
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-0.1.0}"
          DMG_NAME="${APP_NAME}-${VERSION}-${{ matrix.suffix }}"
          RUST_TARGET="${{ matrix.rust_target }}"

          BUILD_DIR="dist/.build_${{ matrix.arch }}"
          APP_DIR="${BUILD_DIR}/${APP_NAME}.app"
          mkdir -p dist "${APP_DIR}/Contents/MacOS" "${APP_DIR}/Contents/Resources"

          # ── 图标 ──
          ICONSET="${BUILD_DIR}/AppIcon.iconset"
          mkdir -p "${ICONSET}"
          for sz in 16 32 64 128 256 512 1024; do
            sips -z $sz $sz assets/logo.png --out "${ICONSET}/tmp_${sz}.png" > /dev/null 2>&1
          done
          cp "${ICONSET}/tmp_16.png"   "${ICONSET}/icon_16x16.png"
          cp "${ICONSET}/tmp_32.png"   "${ICONSET}/icon_16x16@2x.png"
          cp "${ICONSET}/tmp_32.png"   "${ICONSET}/icon_32x32.png"
          cp "${ICONSET}/tmp_64.png"   "${ICONSET}/icon_32x32@2x.png"
          cp "${ICONSET}/tmp_128.png"  "${ICONSET}/icon_128x128.png"
          cp "${ICONSET}/tmp_256.png"  "${ICONSET}/icon_128x128@2x.png"
          cp "${ICONSET}/tmp_256.png"  "${ICONSET}/icon_256x256.png"
          cp "${ICONSET}/tmp_512.png"  "${ICONSET}/icon_256x256@2x.png"
          cp "${ICONSET}/tmp_512.png"  "${ICONSET}/icon_512x512.png"
          cp "${ICONSET}/tmp_1024.png" "${ICONSET}/icon_512x512@2x.png"
          rm -f "${ICONSET}"/tmp_*.png
          iconutil -c icns "${ICONSET}" -o "${BUILD_DIR}/AppIcon.icns"

          # ── 填充 .app ──
          cp "target/${RUST_TARGET}/release/${BINARY_NAME}" \
             "${APP_DIR}/Contents/MacOS/${BINARY_NAME}"
          cp "${BUILD_DIR}/AppIcon.icns" \
             "${APP_DIR}/Contents/Resources/AppIcon.icns"
          cp -R alnilam/ner_model \
             "${APP_DIR}/Contents/Resources/ner_model"

          # ── Info.plist (PlistBuddy 避免 heredoc 破坏 YAML 理解) ──
          PB=/usr/libexec/PlistBuddy
          PFILE="${APP_DIR}/Contents/Info.plist"
          $PB -c "Clear dict"                                                      "$PFILE"
          $PB -c "Add :CFBundleName              string ${APP_NAME}"               "$PFILE"
          $PB -c "Add :CFBundleDisplayName       string Orion 翻译器"            "$PFILE"
          $PB -c "Add :CFBundleIdentifier        string com.orion.translator"       "$PFILE"
          $PB -c "Add :CFBundleVersion           string ${VERSION}"                 "$PFILE"
          $PB -c "Add :CFBundleShortVersionString string ${VERSION}"                "$PFILE"
          $PB -c "Add :CFBundleExecutable        string ${BINARY_NAME}"             "$PFILE"
          $PB -c "Add :CFBundleIconFile          string AppIcon"                    "$PFILE"
          $PB -c "Add :CFBundlePackageType       string APPL"                       "$PFILE"
          $PB -c "Add :CFBundleSignature         string ????"                       "$PFILE"
          $PB -c "Add :LSMinimumSystemVersion    string 13.0"                       "$PFILE"
          $PB -c "Add :NSHighResolutionCapable   bool   true"                       "$PFILE"
          $PB -c "Add :CFBundleInfoDictionaryVersion string 6.0"                   "$PFILE"
          $PB -c "Add :NSSupportsAutomaticGraphicsSwitching bool true"              "$PFILE"

          # ── 签名 ──
          codesign --force --deep --sign - "${APP_DIR}" || true

          # ── DMG ──
          DMG_STAGE="${BUILD_DIR}/dmg_stage"
          mkdir -p "${DMG_STAGE}"
          cp -R "${APP_DIR}" "${DMG_STAGE}/"
          ln -s /Applications "${DMG_STAGE}/Applications"
          hdiutil create \
            -volname "${APP_NAME}" \
            -srcfolder "${DMG_STAGE}" \
            -ov -format UDZO \
            "dist/${DMG_NAME}.dmg"
          rm -rf "${BUILD_DIR}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.suffix }}-dmg
          path: dist/*.dmg

  # ════════════════════════════════════════════════════════════
  # Windows x64 — 双包：完整版 (含模型) + 轻量版 (不含模型)
  # ════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc

      - name: Download NER model
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path alnilam/ner_model | Out-Null
          $files = @("model.safetensors", "config.json", "vocab.txt", "system.dic.zst")
          foreach ($f in $files) {
            Write-Host "Downloading $f ..."
            $url = "https://huggingface.co/${{ env.NER_MODEL_REPO }}/resolve/main/$f"
            Invoke-WebRequest -Uri $url -OutFile "alnilam/ner_model/$f" -MaximumRetryCount 3
          }
          Get-ChildItem alnilam/ner_model/

      - name: Generate logo.ico
        shell: pwsh
        run: |
          # ImageMagick is pre-installed on windows-latest runners
          $sizes = @(256, 128, 64, 48, 32, 16)
          $sizeArg = $sizes -join ','
          magick "assets/logo.png" -define "icon:auto-resize=$sizeArg" "assets/logo.ico"
          Write-Host "Generated assets/logo.ico ($((Get-Item assets/logo.ico).Length) bytes)"

      - name: Build release binary
        run: cargo build --release -p alnitak --target x86_64-pc-windows-msvc

      - name: Package ZIP (完整版 + 轻量版)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          if (-not $version -or $version -eq "") { $version = "0.1.0" }
          $baseName = "${{ env.APP_NAME }}-$version-Windows-x86_64"
          $exeSrc   = "target/x86_64-pc-windows-msvc/release/${{ env.BINARY_NAME }}.exe"

          New-Item -ItemType Directory -Force -Path dist | Out-Null

          # ── 完整版 (含 NER 模型) ──
          $fullDir = "dist/.stage_full/${{ env.APP_NAME }}"
          New-Item -ItemType Directory -Force -Path $fullDir | Out-Null
          Copy-Item $exeSrc "$fullDir/${{ env.BINARY_NAME }}.exe"
          Copy-Item -Recurse "alnilam/ner_model" "$fullDir/ner_model"
          Compress-Archive -Path $fullDir -DestinationPath "dist/${baseName}-Full.zip" -Force
          Remove-Item -Recurse -Force "dist/.stage_full"
          Write-Host "Created dist/${baseName}-Full.zip"

          # ── 轻量版 (不含 NER 模型，用于覆盖更新) ──
          $liteDir = "dist/.stage_lite/${{ env.APP_NAME }}"
          New-Item -ItemType Directory -Force -Path $liteDir | Out-Null
          Copy-Item $exeSrc "$liteDir/${{ env.BINARY_NAME }}.exe"
          Compress-Archive -Path $liteDir -DestinationPath "dist/${baseName}-Update.zip" -Force
          Remove-Item -Recurse -Force "dist/.stage_lite"
          Write-Host "Created dist/${baseName}-Update.zip"

          Get-ChildItem dist/

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Windows-zip
          path: dist/*.zip

  # ════════════════════════════════════════════════════════════
  # Release — 在 tag 推送时自动创建 GitHub Release
  # ════════════════════════════════════════════════════════════
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
